<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>YnotB Portfolio - Software Development & Creative Agency</title>

    <meta
      name="description"
      content="Professional software development, web app design, mobile apps, and custom solutions by the YnotB team."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="/src/styles/index.css">

    <!-- React Bundle -->
    <script defer src="/bundle.js"></script>

    <!-- Global Client Error Reporter -->
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        fetch('/api/client-logs', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: message,
            source: source,
            line: lineno,
            col: colno,
            error: error ? error.toString() : null,
            stack: error ? error.stack : null
          })
        }).catch(() => {});
        return false;
      };

      window.onunhandledrejection = function(event) {
        fetch('/api/client-logs', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: 'Unhandled Promise Rejection',
            error: event.reason ? event.reason.toString() : null,
            stack: event.reason ? event.reason.stack : null
          })
        }).catch(() => {});
      };
    </script>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
